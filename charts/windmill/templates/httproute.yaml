{{- if .Values.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: windmill
spec:
{{- with .Values.httproute.appParentRefs | default .Values.httproute.parentRefs }}
  parentRefs:
{{ toYaml . | indent 4 }}
{{- end }}
  hostnames:
  - {{ .Values.windmill.baseDomain | quote }}
  rules:
  {{- if gt (int .Values.windmill.extraReplicas) 0 }}
  - matches:
    - path:
        type: PathPrefix
        value: "/ws/"
    - path:
        type: PathPrefix
        value: "/ws_debug/"
    {{- if .Values.enterprise.enabled }}
    - path:
        type: PathPrefix
        value: "/ws_mp/"
    {{- end }}
    backendRefs:
    - name: windmill-extra
      port: 3000
  {{- end }}
  {{ if .Values.enterprise.enabled }}
  {{ if .Values.windmill.indexer.enabled }}
  - matches:
    - path:
        type: PathPrefix
        value: "/api/srch/"
    backendRefs:
    - name: windmill-indexer
      port: 8000
  {{ end }}
  {{ end }}
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: windmill-app
      port: 8000

